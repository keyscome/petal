env:
  OBS_AK: 
  OBS_SK: 
  OBS_ENDPOINT: obs.cn-north-4.myhuaweicloud.com
tasks:
  - name: Check Sense Env
    hosts:
      - node1
      - node2
      - node3
    cmd: |
      echo $OBS_AK
      echo $OBS_SK
      echo $OBS_ENDPOINT
  - name: Configure OBS Credential
    hosts: 
      - node1
      - node2
      - node3
    cmd: |
      obsutil config -i $OBS_AK -k $OBS_SK -e $OBS_ENDPOINT
  - name: Check OBS Credential
    hosts:
      - node1
      - node2
      - node3
    cmd:
      cat ~/.obsutilconfig | head -n 3