<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌱 Petal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }

    header span.badge {
      font-size: 0.7rem;
      background: #1f6feb33;
      color: #58a6ff;
      border: 1px solid #1f6feb;
      border-radius: 12px;
      padding: 2px 8px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: border-color 0.15s;
    }

    .task-card:hover {
      border-color: #58a6ff55;
    }

    .task-info {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 1rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 6px;
    }

    .task-hosts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .host-tag {
      font-size: 0.72rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 8px;
      color: #79c0ff;
      font-family: 'Courier New', monospace;
    }

    .task-cmd {
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
      color: #8b949e;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px 10px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow: hidden;
      position: relative;
    }

    .run-btn {
      flex-shrink: 0;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .run-btn:hover:not(:disabled) {
      background: #2ea043;
    }

    .run-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .run-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Output panel */
    .output-panel {
      margin-top: 32px;
    }

    .output-panel.hidden {
      display: none;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .output-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e6edf3;
    }

    .output-title .task-label {
      color: #58a6ff;
    }

    .status-badge {
      font-size: 0.72rem;
      border-radius: 12px;
      padding: 2px 10px;
      font-weight: 600;
    }

    .status-badge.running {
      background: #9e6a0322;
      color: #d29922;
      border: 1px solid #d2992266;
    }

    .status-badge.done {
      background: #1a7f3722;
      color: #3fb950;
      border: 1px solid #3fb95066;
    }

    .status-badge.error {
      background: #f8514922;
      color: #f85149;
      border: 1px solid #f8514966;
    }

    .output-box {
      background: #010409;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      min-height: 120px;
      max-height: 480px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .line-header  { color: #56d4dd; }
    .line-running { color: #d29922; }
    .line-success { color: #3fb950; }
    .line-error   { color: #f85149; }
    .line-plain   { color: #c9d1d9; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #d2992244;
      border-top-color: #d29922;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
      font-size: 0.9rem;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    footer {
      text-align: center;
      padding: 24px;
      color: #484f58;
      font-size: 0.75rem;
      border-top: 1px solid #21262d;
      margin-top: 48px;
    }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.5rem">🌱</span>
  <h1>Petal</h1>
  <span class="badge">Task Runner</span>
</header>

<main>
  <div class="section-title">Tasks</div>
  <div id="taskList" class="task-list">
    <div class="empty-state">
      <div class="icon">⏳</div>
      Loading tasks…
    </div>
  </div>

  <div id="outputPanel" class="output-panel hidden">
    <div class="output-header">
      <div class="output-title">
        Output — <span id="outputTaskLabel" class="task-label"></span>
      </div>
      <span id="statusBadge" class="status-badge running">
        <span class="spinner"></span>Running
      </span>
    </div>
    <div id="outputBox" class="output-box"></div>
  </div>
</main>

<footer>🌱 Petal — parallel SSH task runner</footer>

<script>
  let activeSource = null;

  async function loadTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error('Failed to load tasks');
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (e) {
      document.getElementById('taskList').innerHTML =
        `<div class="empty-state"><div class="icon">❌</div>${e.message}</div>`;
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    if (!tasks || tasks.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No tasks defined in task.yml</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-card" id="card-${escHtml(t.name)}">
        <div class="task-info">
          <div class="task-name">${escHtml(t.name)}</div>
          <div class="task-hosts">
            ${(t.hosts || []).map(h => `<span class="host-tag">${escHtml(h)}</span>`).join('')}
          </div>
          <div class="task-cmd">${escHtml(t.cmd || '')}</div>
        </div>
        <button class="run-btn" data-task="${escHtml(t.name)}">▶ Run</button>
      </div>
    `).join('');

    // Attach click listeners after rendering to avoid inline handler injection risk.
    list.querySelectorAll('.run-btn').forEach(btn => {
      btn.addEventListener('click', () => runTask(btn.dataset.task));
    });
  }

  function runTask(name) {
    // Close any existing SSE connection
    if (activeSource) {
      activeSource.close();
      activeSource = null;
    }

    const btn = document.querySelector(`.run-btn[data-task="${escHtml(name)}"]`);
    if (btn) btn.disabled = true;

    // Show output panel
    const panel = document.getElementById('outputPanel');
    const box = document.getElementById('outputBox');
    const label = document.getElementById('outputTaskLabel');
    const badge = document.getElementById('statusBadge');

    panel.classList.remove('hidden');
    box.innerHTML = '';
    label.textContent = name;
    badge.className = 'status-badge running';
    badge.innerHTML = '<span class="spinner"></span>Running';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const es = new EventSource('/api/run/' + encodeURIComponent(name));
    activeSource = es;

    es.addEventListener('message', (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.done) {
          es.close();
          activeSource = null;
          badge.className = 'status-badge done';
          badge.innerHTML = '✓ Done';
          if (btn) btn.disabled = false;
          return;
        }
        appendLine(box, msg.type, msg.text);
      } catch (_) {}
    });

    es.addEventListener('error', () => {
      es.close();
      activeSource = null;
      badge.className = 'status-badge error';
      badge.innerHTML = '✗ Error';
      if (btn) btn.disabled = false;
    });
  }

  function appendLine(box, type, text) {
    const cls = {
      header:  'line-header',
      running: 'line-running',
      success: 'line-success',
      error:   'line-error',
    }[type] || 'line-plain';

    const span = document.createElement('span');
    span.className = cls;
    span.textContent = text + '\n';
    box.appendChild(span);
    box.scrollTop = box.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadTasks();
</script>
</body>
</html>
